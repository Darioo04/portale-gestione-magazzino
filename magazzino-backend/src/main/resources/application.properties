# Local MySQL database configuration
spring.datasource.url=jdbc:mysql://172.20.100.49:3306/db_magazzino?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# Show SQL statements in the console for debugging purposes
spring.jpa.show-sql=true

# Disable automatic schema generation and updates, as the database schema is managed manually
spring.jpa.hibernate.ddl-auto=none

# Use the standard physical naming strategy to prevent automatic conversion of entity names to snake_case
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
