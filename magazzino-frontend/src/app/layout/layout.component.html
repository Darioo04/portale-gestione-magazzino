<mat-sidenav-container class="h-screen w-screen" *ngIf="isHandset$ | async as isHandset; else desktopLayout">
  <!-- Mobile: sidenav in modalità 'over' (copre il contenuto) -->
  <mat-sidenav #sidenav [mode]="'over'" [opened]="false" class="w-64">
    <div class="h-16 flex items-center justify-center border-b border-gray-800">
      <mat-icon class="text-blue-500 mr-2">warehouse</mat-icon>
      <span class="text-xl font-bold tracking-wider text-white">Magazzino</span>
    </div>
    <mat-nav-list class="pt-4 px-2">
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-nav-item" [routerLinkActiveOptions]="{exact: true}" class="rounded-lg mb-1" (click)="sidenav.close()">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <div matListItemTitle>Dashboard</div>
      </a>
      <a mat-list-item routerLink="/categories" routerLinkActive="active-nav-item" class="rounded-lg mb-1" (click)="sidenav.close()">
        <mat-icon matListItemIcon>category</mat-icon>
        <div matListItemTitle>Categorie</div>
      </a>
      <a mat-list-item routerLink="/products" routerLinkActive="active-nav-item" class="rounded-lg mb-1" (click)="sidenav.close()">
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <div matListItemTitle>Prodotti</div>
      </a>
      <a mat-list-item routerLink="/movements" routerLinkActive="active-nav-item" class="rounded-lg mb-1" (click)="sidenav.close()">
        <mat-icon matListItemIcon>sync_alt</mat-icon>
        <div matListItemTitle>Movimenti</div>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="flex flex-col">
    <ng-container *ngTemplateOutlet="toolbar; context: { $implicit: sidenav }"></ng-container>
    <main class="flex-1 p-4 overflow-auto">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>

<!-- Desktop layout -->
<ng-template #desktopLayout>
  <mat-sidenav-container class="h-screen w-screen">
    <mat-sidenav #sidenavDesktop mode="side" opened class="w-64">
      <div class="h-16 flex items-center justify-center border-b border-gray-800">
        <mat-icon class="text-blue-500 mr-2">warehouse</mat-icon>
        <span class="text-xl font-bold tracking-wider text-white">Magazzino</span>
      </div>
      <mat-nav-list class="pt-4 px-2">
        <a mat-list-item routerLink="/dashboard" routerLinkActive="active-nav-item" [routerLinkActiveOptions]="{exact: true}" class="rounded-lg mb-1">
          <mat-icon matListItemIcon>dashboard</mat-icon>
          <div matListItemTitle>Dashboard</div>
        </a>
        <a mat-list-item routerLink="/categories" routerLinkActive="active-nav-item" class="rounded-lg mb-1">
          <mat-icon matListItemIcon>category</mat-icon>
          <div matListItemTitle>Categorie</div>
        </a>
        <a mat-list-item routerLink="/products" routerLinkActive="active-nav-item" class="rounded-lg mb-1">
          <mat-icon matListItemIcon>inventory_2</mat-icon>
          <div matListItemTitle>Prodotti</div>
        </a>
        <a mat-list-item routerLink="/movements" routerLinkActive="active-nav-item" class="rounded-lg mb-1">
          <mat-icon matListItemIcon>sync_alt</mat-icon>
          <div matListItemTitle>Movimenti</div>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content class="flex flex-col">
      <ng-container *ngTemplateOutlet="toolbar; context: { $implicit: sidenavDesktop }"></ng-container>
      <main class="flex-1 p-6 overflow-auto">
        <router-outlet></router-outlet>
      </main>
    </mat-sidenav-content>
  </mat-sidenav-container>
</ng-template>

<!-- Toolbar condivisa (template riusabile) -->
<ng-template #toolbar let-sidenavRef>
  <mat-toolbar class="toolbar-sticky border-b border-gray-800 flex justify-between shadow-sm px-4 md:px-6">
    <div>
      <button mat-icon-button (click)="sidenavRef.toggle()" aria-label="Toggle menu">
        <mat-icon>menu</mat-icon>
      </button>
    </div>

    <div class="flex items-center gap-3" *ngIf="currentUser$ | async as user">
      <span class="text-sm font-medium text-gray-300 hidden sm:inline">
        Ciao, <span class="text-blue-400 font-semibold">{{ user.sub }}</span>
      </span>
      <button mat-flat-button color="warn" (click)="logout()" class="rounded-full">
        <mat-icon class="mr-1">logout</mat-icon>
        <span class="hidden sm:inline">Logout</span>
      </button>
    </div>
  </mat-toolbar>
</ng-template>
