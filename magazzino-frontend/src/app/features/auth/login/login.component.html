<div class="min-h-screen bg-[#121212] flex items-center justify-center p-4">
  <mat-card class="w-full max-w-md border border-gray-800 shadow-2xl overflow-hidden" style="border-radius:16px">

    <!-- Barra blu in cima -->
    <div class="h-1.5 bg-gradient-to-r from-blue-500 to-blue-400 w-full"></div>

    <!-- Header custom: icona sopra il titolo -->
    <div class="flex flex-col items-center pt-8 pb-2 px-8">
      <div class="w-16 h-16 bg-blue-500/15 rounded-full flex items-center justify-center mb-4">
        <mat-icon class="text-blue-400 avatar-icon">warehouse</mat-icon>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-wide m-0">Magazzino Pro</h1>
      <p class="text-gray-400 mt-1 mb-0 text-sm">Accedi per continuare</p>
    </div>

    <mat-card-content class="px-8 pb-8 pt-4">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

        <div *ngIf="error" class="bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg text-sm flex items-center gap-2">
          <mat-icon class="text-red-400 flex-shrink-0" style="font-size:18px;width:18px;height:18px">error_outline</mat-icon>
          {{ error }}
        </div>

        <mat-form-field appearance="outline" class="w-full custom-field">
          <mat-label>Username</mat-label>
          <mat-icon matPrefix class="mr-2">person</mat-icon>
          <input matInput formControlName="username" placeholder="Inserisci username" />
          <mat-error *ngIf="loginForm.get('username')?.hasError('required')">Username obbligatorio</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full custom-field">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix class="mr-2">lock</mat-icon>
          <input matInput type="password" formControlName="password" placeholder="Inserisci password" />
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password obbligatoria</mat-error>
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit"
          [disabled]="loginForm.invalid || loading"
          class="w-full rounded-xl mt-2 text-base"
          style="height:48px">
          <mat-icon *ngIf="!loading" style="margin-right:6px">login</mat-icon>
          <mat-icon *ngIf="loading" style="margin-right:6px;animation:spin 1s linear infinite">autorenew</mat-icon>
          {{ loading ? 'Accesso in corso...' : 'Accedi' }}
        </button>

      </form>
    </mat-card-content>
  </mat-card>
</div>

<style>
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
