<div class="min-h-screen bg-[#121212] flex items-center justify-center p-4">
  <mat-card class="w-full max-w-md bg-[#1e1e1e] border border-gray-800 shadow-2xl rounded-2xl overflow-hidden">
    
    <div class="h-2 bg-blue-500 w-full"></div>
    
    <mat-card-header class="flex flex-col items-center pt-8 pb-4">
      <div class="w-16 h-16 bg-blue-500/10 rounded-full flex items-center justify-center mb-4">
        <mat-icon class="text-blue-500 text-3xl h-auto w-auto">warehouse</mat-icon>
      </div>
      <mat-card-title class="text-2xl font-bold text-white tracking-wide">Magazzino Pro</mat-card-title>
      <mat-card-subtitle class="text-gray-400 mt-1">Accedi per continuare</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="px-8 pb-8">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col space-y-4">
        
        <div *ngIf="error" class="bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg text-sm flex items-center">
          <mat-icon class="mr-2 text-red-500 text-sm h-5 w-5">error_outline</mat-icon>
          {{ error }}
        </div>

        <mat-form-field appearance="outline" class="w-full custom-field">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" placeholder="Inserisci username" />
          <mat-icon matPrefix class="mr-2 text-gray-400">person</mat-icon>
          <mat-error *ngIf="loginForm.get('username')?.hasError('required')">Username obbligatorio</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full custom-field">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" placeholder="Inserisci password" />
          <mat-icon matPrefix class="mr-2 text-gray-400">lock</mat-icon>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password obbligatoria</mat-error>
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" [disabled]="loginForm.invalid || loading" class="w-full py-6 rounded-xl mt-4 text-lg shadow-blue-500/30 shadow-lg transition-transform active:scale-95">
          <mat-icon *ngIf="!loading" class="mr-2">login</mat-icon>
          <mat-icon *ngIf="loading" class="mr-2 animate-spin">autorenew</mat-icon>
          {{ loading ? 'Accesso in corso...' : 'Accedi' }}
        </button>

      </form>
    </mat-card-content>
  </mat-card>
</div>
