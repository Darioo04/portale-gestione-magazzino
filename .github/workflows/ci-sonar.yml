name: CI & Sonar Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ "main" ]

jobs:
  build-and-analyze:
    name: Build, Test and Analyze
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del codice (fondamentale fetch-depth: 0 per Sonar)
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Java
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      # 3. Cache specifica per SonarQube
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # 4. Build + Analisi Sonar
      # Il comando 'verify' esegue tutto: compilazione, test e analisi
      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Necessario per commenti su PR
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=Darioo04_portale-gestione-magazzino

      # 5. Update dependency graph
      - name: Update dependency graph
        if: github.event_name == 'push' # Lo facciamo solo sul push per non rallentare le PR
        uses: advanced-security/maven-dependency-submission-action@v4
