name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Scarica il codice dal repository
    - uses: actions/checkout@v4

    # 2. Configura l'ambiente Java
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    # 3. Compila e pacchettizza tutto il progetto (Backend, Frontend, EAR)
    - name: Build with Maven
      run: mvn -B clean install
